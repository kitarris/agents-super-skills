<!-- TitlePromise / promise-visual -->
<article class="slide layout-promise-visual" data-type="Title / Promise" data-title="{{CLAIM_TITLE}}">
  <div class="stage promise-template">
    <div class="promise-text">
      <h1>{{CLAIM_TITLE}}</h1>
      <p class="lead">{{SUPPORT_TEXT}}</p>
    </div>
    <div class="visual-anchor" aria-label="{{VISUAL_MESSAGE}}">{{VISUAL}}</div>
  </div>
</article>

<!-- EvidenceRight / evidence-right -->
<article class="slide layout-evidence-right" data-type="Evidence / Data" data-title="{{CLAIM_TITLE}}">
  <div class="stage">
    <div class="evidence-template">
      <h2 class="evidence-title">{{CLAIM_TITLE}}</h2>
      <div class="evidence-text">
        <p class="lead">{{SUPPORT_TEXT}}</p>
        <div class="caveat-note">{{CAVEAT_NOTE}}</div>
      </div>
      <div class="evidence-chart" aria-label="{{PROOF_MESSAGE}}">
        {{CHART}}
      </div>
    </div>
  </div>
  <div class="source">{{SOURCE}}</div>
</article>

<!-- FrameworkGrid / framework-2x2 -->
<article class="slide layout-framework-2x2" data-type="Framework / Mental Model" data-title="{{CLAIM_TITLE}}">
  <div class="stage">
    <div class="copy">
      <h2>{{CLAIM_TITLE}}</h2>
      <p>{{SUPPORT_TEXT}}</p>
    </div>
    <div class="framework-grid">
      {{FRAMEWORK_CARDS}}
    </div>
  </div>
</article>

<!-- ContrastDuo / contrast-duo -->
<article class="slide layout-contrast-duo" data-type="Contrast / Before-After" data-title="{{CLAIM_TITLE}}">
  <div class="stage">
    <div class="copy">
      <h2>{{CLAIM_TITLE}}</h2>
      <p>{{SUPPORT_TEXT}}</p>
    </div>
    <div class="contrast-duo">
      <div class="contrast-side before">{{BEFORE}}</div>
      <div class="contrast-side after">{{AFTER}}</div>
    </div>
  </div>
</article>
